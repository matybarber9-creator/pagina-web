<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Citas - MatyBarber</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <nav>
        <h1>MatyBarber 💈</h1>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="citas.html">Citas</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>
</header>

<section>
    <h2>Pide cita 💈</h2>

    <form id="formCita" onsubmit="enviarPorWhatsApp(event)">
        <label for="nombreCliente">Nombre completo:</label>
        <input type="text" id="nombreCliente" placeholder="Tu nombre" required>

        <label for="emailCliente">Correo electrónico:</label>
        <input type="email" id="emailCliente" placeholder="tu@email.com" required>

        <label for="servicioCita">¿Qué servicio quieres?</label>
        <select id="servicioCita" required>
            <option value="" disabled selected>Selecciona un servicio</option>
            <option value="Barba">Barba</option>
            <option value="Barba y Degradado">Barba y Degradado</option>
            <option value="Tijera">Tijera</option>
            <option value="Decoloración">Decoloración</option>
            <option value="Tinte">Tinte</option>
        </select>

        <label for="fechaCita">Selecciona el día:</label>
        <input type="date" id="fechaCita" required>

        <label id="labelHora" style="display:none;">Selecciona la hora disponible:</label>
        <div id="contenedorHoras" class="grid-horas"></div>
        
        <input type="hidden" id="horaSeleccionada" required>

        <div class="checkbox-container">
            <input type="checkbox" id="condiciones" required>
            <label for="condiciones">Acepto los términos y confirmo mi asistencia.</label>
        </div>

        <button type="submit" class="btn">Pedir cita por WhatsApp</button>
    </form>
</section>

<footer>
    <p>© 2026 MatyBarber</p>
</footer>

<script src="script.js"></script>

</body>
</html>
